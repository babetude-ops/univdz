<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Admin — UnivDZ</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'IBM Plex Sans',sans-serif; background:#f0fdf4; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box { background:white; padding:2.5rem; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.1); width:100%; max-width:380px; }
    h1 { font-size:1.6rem; font-weight:700; color:#111827; margin-bottom:.25rem; }
    .subtitle { color:#6b7280; font-size:.875rem; margin-bottom:2rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-size:.875rem; font-weight:500; color:#374151; margin-bottom:.35rem; }
    input { width:100%; padding:.6rem .85rem; border:1px solid #e5e7eb; border-radius:6px; font-family:inherit; font-size:.9rem; }
    input:focus { outline:none; border-color:#1a6b3c; box-shadow:0 0 0 3px rgba(26,107,60,.1); }
    .btn { width:100%; padding:.7rem; background:#1a6b3c; color:white; border:none; border-radius:6px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:.5rem; }
    .btn:hover { background:#2a9d5e; }
    .flash { padding:.75rem; border-radius:6px; background:#fee2e2; color:#991b1b; margin-bottom:1rem; font-size:.875rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>⚙️ UnivDZ Admin</h1>
    <p class="subtitle">Connexion à l'espace d'administration</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="post">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn">Se connecter</button>
    </form>
  </div>
</body>
</html>
