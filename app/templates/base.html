<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}La boussole du Web{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">

<div class="container nav-container">

<a href="{{ url_for('main.index') }}" class="logo">
La boussole du Web
</a>

<nav class="nav-menu">

<a href="{{ url_for('main.index') }}">Accueil</a>
<a href="{{ url_for('main.evenements') }}">Événements</a>
<a href="{{ url_for('main.bourses') }}">Bourses</a>
<a href="{{ url_for('main.revues') }}">Revues</a>

</nav>

</div>

</header>

<main class="main-content">

<div class="container">

{% block content %}{% endblock %}

</div>

</main>

<footer class="footer">

<div class="container footer-inner">

<div class="footer-brand">
La boussole du Web
</div>

<p>
Plateforme des manifestations universitaires et opportunités académiques
</p>

</div>

</footer>

</body>
</html>
